<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Barcode - Inventory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f2740;
      color: #fff;
      margin: 0;
      padding: 18px 14px 28px;
      text-align: center;
      min-height: 100vh;
    }
    h3 { margin: 4px 0 14px; font-size: 17px; }

    /* ==== Toggle mode Input / Lihat ==== */
    #modeToggle {
      display: flex;
      max-width: 420px;
      margin: 0 auto 14px;
      background: #16324f;
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }
    #modeToggle button {
      flex: 1;
      border: none;
      background: transparent;
      color: #93a5bb;
      padding: 10px 8px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #modeToggle button.active.mode-input {
      background: #1d4ed8;
      color: #fff;
    }
    #modeToggle button.active.mode-view {
      background: #0891b2;
      color: #fff;
    }
    #modeLabel {
      max-width: 420px;
      margin: 0 auto 12px;
      font-size: 12px;
      color: #93a5bb;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #1d4ed8;
      transition: border-color .15s;
    }
    #reader.mode-view { border-color: #0891b2; }

    #result {
      margin: 16px auto 0;
      max-width: 420px;
      padding: 14px;
      border-radius: 10px;
      background: #16324f;
      min-height: 54px;
      font-size: 14px;
      line-height: 1.5;
    }
    .ok { color: #4ade80; font-weight: 600; }
    .warn { color: #fbbf24; font-weight: 600; }
    .err { color: #f87171; font-weight: 600; }
    .view { color: #22d3ee; font-weight: 600; }
    #history {
      max-width: 420px;
      margin: 18px auto 0;
      text-align: left;
      font-size: 12.5px;
      color: #cbd5e1;
    }
    #history div { padding: 6px 8px; border-bottom: 1px solid #1e3a5f; }
    .hint { color: #93a5bb; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <h3>📷 Scan Barcode / QR Asset</h3>

  <div id="modeToggle">
    <button type="button" id="btnModeInput" class="active mode-input">📝 Input Data</button>
    <button type="button" id="btnModeView" class="mode-view">👁️ Lihat Data</button>
  </div>
  <div id="modeLabel">Mode: <b id="modeLabelText">Input Data</b> — hasil scan akan <b id="modeLabelEffect">dicatat ke log</b>.</div>

  <div id="reader" class="mode-input"></div>
  <div id="result">Arahkan kamera ke barcode/QR kode asset...</div>
  <div id="history"></div>
  <div class="hint">Halaman ini otomatis mencatat hasil scan ke Google Sheet inventory saat mode "Input Data" aktif. Mode "Lihat Data" hanya menampilkan info asset, TIDAK mencatat apa pun.</div>

  <script>
    // ==========================================================
    // WAJIB DIISI sebelum di-deploy:
    // 1. WEBAPP_URL  -> URL deployment Web App Apps Script Anda, akhiran "/exec"
    //    (Deploy > Manage deployments > salin "Web app" URL)
    // 2. SECRET_KEY   -> HARUS SAMA PERSIS dengan secret yang diset lewat menu
    //    Google Sheets "🔑 Set / Ganti Secret Scanner Eksternal"
    //
    // CATATAN KEAMANAN: karena halaman ini statis (di-host di GitHub Pages,
    // tanpa server backend), SECRET_KEY ini pasti terlihat oleh siapa pun yang
    // membuka "view source" halaman ini. Anggap secret ini sebagai "kunci pintu
    // gudang", bukan password rahasia mutlak - fungsinya mencegah akses acak/
    // bot, BUKAN mencegah orang yang memang berniat jahat dan mau capek-capek
    // membaca source code. Untuk keamanan lebih tinggi, ganti secret ini secara
    // berkala lewat menu di atas.
    // ==========================================================
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzxkckkPqqP941voakxwslX-3RRkn62zAyJY7PB6tozZvYGU6ItXqOlAFUdlwzhs8NO/exec';
    const SECRET_KEY = 'Malang2026';

    // Mode aktif sekarang: 'input' (dicatat ke Sheet1 + Log Perubahan) atau
    // 'view' (hanya lookup, TIDAK menulis apa pun). Dikirim ke server lewat
    // field "mode" supaya doPost() di Code.gs tahu harus lookup-only atau
    // proses-dan-catat.
    let currentMode = 'input';

    let busy = false;
    const historyEl = document.getElementById('history');
    const resultEl = document.getElementById('result');
    const readerEl = document.getElementById('reader');
    const btnModeInput = document.getElementById('btnModeInput');
    const btnModeView = document.getElementById('btnModeView');
    const modeLabelText = document.getElementById('modeLabelText');
    const modeLabelEffect = document.getElementById('modeLabelEffect');

    function setMode(mode) {
      currentMode = mode;
      const isView = mode === 'view';

      btnModeInput.classList.toggle('active', !isView);
      btnModeView.classList.toggle('active', isView);
      readerEl.classList.toggle('mode-view', isView);
      readerEl.classList.toggle('mode-input', !isView);

      modeLabelText.textContent = isView ? 'Lihat Data' : 'Input Data';
      modeLabelEffect.textContent = isView
        ? 'HANYA ditampilkan, tidak dicatat ke log'
        : 'dicatat ke log';

      resultEl.innerText = isView
        ? 'Arahkan kamera ke barcode/QR untuk melihat info asset (tidak dicatat)...'
        : 'Arahkan kamera ke barcode/QR kode asset...';
    }

    btnModeInput.addEventListener('click', function () { if (!busy) setMode('input'); });
    btnModeView.addEventListener('click', function () { if (!busy) setMode('view'); });

    function addHistory(text, cls) {
      const row = document.createElement('div');
      row.innerHTML = '<span class="' + cls + '">' + text + '</span>';
      historyEl.prepend(row);
      while (historyEl.children.length > 8) historyEl.removeChild(historyEl.lastChild);
    }

    function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;
      const modeAtScan = currentMode; // kunci mode saat scan terjadi, jaga2 kalau user ganti toggle saat request masih berjalan
      resultEl.innerHTML = 'Memproses kode: ' + decodedText + ' ...';

      fetch(WEBAPP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari preflight CORS
        body: JSON.stringify({ data: decodedText, secret: SECRET_KEY, mode: modeAtScan })
      })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          const isView = modeAtScan === 'view';
          if (res.status !== 'success') {
            resultEl.innerHTML = '<span class="err">❌ ' + (res.message || 'Gagal') + '</span>';
            addHistory('❌ ' + (res.message || 'Gagal'), 'err');
          } else if (res.found) {
            const tagClass = isView ? 'view' : 'ok';
            const tagIcon = isView ? '👁️' : '✅';
            resultEl.innerHTML =
              '<span class="' + tagClass + '">' + tagIcon + ' ' + res.item.number + ' - ' + res.item.item + '</span><br>' +
              res.item.department + ' • ' + res.item.location +
              (isView ? '<br><small>(mode lihat - tidak dicatat)</small>' : '');
            addHistory(tagIcon + ' ' + res.timestamp + ' — ' + res.item.number + ' (' + res.item.item + ')' + (isView ? ' [lihat saja]' : ''), tagClass);
          } else {
            resultEl.innerHTML =
              '<span class="warn">⚠️ Kode "' + decodedText + '" tidak ditemukan di data.</span>' +
              (isView ? '' : '<br>Tetap dicatat di log scan.');
            addHistory('⚠️ ' + res.timestamp + ' — kode "' + decodedText + '" tidak dikenal' + (isView ? ' [lihat saja]' : ''), 'warn');
          }
          setTimeout(function () {
            busy = false;
            resultEl.innerText = modeAtScan === 'view'
              ? 'Arahkan kamera ke barcode/QR untuk melihat info asset (tidak dicatat)...'
              : 'Arahkan kamera ke barcode/QR kode asset berikutnya...';
          }, 2200);
        })
        .catch(function (err) {
          resultEl.innerHTML = '<span class="err">❌ Gagal menghubungi server: ' + err + '</span>';
          addHistory('❌ Gagal menghubungi server', 'err');
          busy = false;
        });
    }

    if (WEBAPP_URL.indexOf('GANTI_DENGAN') !== -1 || SECRET_KEY.indexOf('GANTI_DENGAN') !== -1) {
      resultEl.innerHTML = '<span class="err">Halaman belum dikonfigurasi. Isi WEBAPP_URL & SECRET_KEY di source code dulu.</span>';
    } else if (typeof Html5Qrcode === 'undefined') {
      resultEl.innerHTML = '<span class="err">Gagal memuat library scanner. Periksa koneksi internet lalu muat ulang halaman.</span>';
    } else {
      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(function (err) {
        resultEl.innerHTML = '<span class="err">Gagal mengakses kamera: ' + err + '<br>Pastikan browser diberi izin kamera dan halaman diakses lewat HTTPS.</span>';
      });
    }
  </script>
</body>
</html>
