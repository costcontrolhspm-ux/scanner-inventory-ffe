<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Barcode - Inventory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f2740;
      color: #fff;
      margin: 0;
      padding: 18px 14px 28px;
      text-align: center;
      min-height: 100vh;
    }
    h3 { margin: 4px 0 14px; font-size: 17px; }

    /* ---- Toggle 2 mode ---- */
    #modeToggle {
      display: flex;
      max-width: 420px;
      margin: 0 auto 14px;
      background: #16324f;
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }
    #modeToggle button {
      flex: 1;
      border: none;
      background: transparent;
      color: #9fb3c8;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #modeToggle button.active {
      background: #1d4ed8;
      color: #fff;
    }
    #modeToggle button.active.view-active {
      background: #0e7490;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #1d4ed8;
      transition: border-color 0.15s;
    }
    #reader.view-mode { border-color: #0e7490; }

    #result {
      margin: 16px auto 0;
      max-width: 420px;
      padding: 14px;
      border-radius: 10px;
      background: #16324f;
      min-height: 54px;
      font-size: 14px;
      line-height: 1.5;
    }
    .ok { color: #4ade80; font-weight: 600; }
    .warn { color: #fbbf24; font-weight: 600; }
    .err { color: #f87171; font-weight: 600; }

    /* ---- Kartu Asset (mode "Lihat Kartu Asset") ---- */
    .kartu {
      text-align: left;
      background: #0f2740;
      border: 1px solid #1d4ed8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 4px;
    }
    .kartu.view { border-color: #0e7490; }
    .kartu .kartu-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .kartu table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .kartu table td { padding: 3px 0; vertical-align: top; }
    .kartu table td.label { color: #93a5bb; width: 40%; white-space: nowrap; }
    .kartu table td.val { color: #e2e8f0; font-weight: 600; }
    .kartu .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
    }
    .badge-ffe1 { background: #1d4ed8; color: #fff; }
    .badge-ffe2 { background: #7c3aed; color: #fff; }

    #history {
      max-width: 420px;
      margin: 18px auto 0;
      text-align: left;
      font-size: 12.5px;
      color: #cbd5e1;
    }
    #history div { padding: 6px 8px; border-bottom: 1px solid #1e3a5f; }
    .hint { color: #93a5bb; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <h3>📷 Scan Barcode / QR Asset</h3>

  <div id="modeToggle">
    <button id="btnModeInput" class="active" onclick="setMode('input')">✍️ Input Data</button>
    <button id="btnModeView" onclick="setMode('view')">📋 Lihat Kartu Asset</button>
  </div>

  <div id="reader"></div>
  <div id="result">Arahkan kamera ke barcode/QR kode asset...</div>
  <div id="history"></div>
  <div class="hint" id="hintText">Mode aktif: <b>Input Data</b> - setiap hasil scan otomatis dicatat ke Google Sheet inventory.</div>

  <script>
    // ==========================================================
    // WAJIB DIISI sebelum di-deploy:
    // 1. WEBAPP_URL  -> URL deployment Web App Apps Script Anda, akhiran "/exec"
    //    (Deploy > Manage deployments > salin "Web app" URL)
    // 2. SECRET_KEY   -> HARUS SAMA PERSIS dengan secret yang diset lewat menu
    //    Google Sheets "🔑 Set / Ganti Secret Scanner Eksternal"
    //
    // CATATAN KEAMANAN: karena halaman ini statis (di-host di GitHub Pages,
    // tanpa server backend), SECRET_KEY ini pasti terlihat oleh siapa pun yang
    // membuka "view source" halaman ini. Anggap secret ini sebagai "kunci pintu
    // gudang", bukan password rahasia mutlak - fungsinya mencegah akses acak/
    // bot, BUKAN mencegah orang yang memang berniat jahat dan mau capek-capek
    // membaca source code. Untuk keamanan lebih tinggi, ganti secret ini secara
    // berkala lewat menu di atas.
    //
    // ==========================================================
    // FITUR 2 MODE:
    // - "Input Data"        -> perilaku lama (default): hasil scan dicatat ke
    //   Sheet1 + Log Perubahan di backend (processScan_ / doPost mode=input).
    // - "Lihat Kartu Asset" -> HANYA menampilkan info asset (kartu) di layar,
    //   TIDAK menulis apa pun ke sheet (backend memakai lookupAsset_ / doPost
    //   mode=view). Cocok dipakai untuk cek cepat info asset tanpa mengubah
    //   data log/riwayat.
    // Pastikan Code.gs di backend sudah diperbarui (menambahkan lookupAsset_
    // dan pengecekan "mode" di doPost) supaya toggle ini benar-benar berfungsi.
    // ==========================================================
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzxkckkPqqP941voakxwslX-3RRkn62zAyJY7PB6tozZvYGU6ItXqOlAFUdlwzhs8NO/exec';
    const SECRET_KEY = 'Malang2026';

    let busy = false;
    let currentMode = 'input'; // 'input' | 'view'
    const historyEl = document.getElementById('history');
    const resultEl = document.getElementById('result');
    const readerEl = document.getElementById('reader');
    const hintEl = document.getElementById('hintText');
    const btnInput = document.getElementById('btnModeInput');
    const btnView = document.getElementById('btnModeView');

    function setMode(mode) {
      currentMode = mode;
      const isView = mode === 'view';
      btnInput.classList.toggle('active', !isView);
      btnView.classList.toggle('active', isView);
      btnView.classList.toggle('view-active', isView);
      readerEl.classList.toggle('view-mode', isView);
      hintEl.innerHTML = isView
        ? 'Mode aktif: <b>Lihat Kartu Asset</b> - hasil scan HANYA ditampilkan, tidak dicatat ke Google Sheet.'
        : 'Mode aktif: <b>Input Data</b> - setiap hasil scan otomatis dicatat ke Google Sheet inventory.';
      resultEl.innerText = isView
        ? 'Arahkan kamera ke QR asset untuk melihat kartu asset...'
        : 'Arahkan kamera ke barcode/QR kode asset...';
    }

    function addHistory(text, cls) {
      const row = document.createElement('div');
      row.innerHTML = '<span class="' + cls + '">' + text + '</span>';
      historyEl.prepend(row);
      while (historyEl.children.length > 8) historyEl.removeChild(historyEl.lastChild);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderKartuAsset(item) {
      const badgeClass = item.category === 'FFE 2' ? 'badge-ffe2' : 'badge-ffe1';
      let rows = ''
        + '<tr><td class="label">Kode Asset</td><td class="val">' + escapeHtml(item.number) + '</td></tr>'
        + '<tr><td class="label">Nama Item</td><td class="val">' + escapeHtml(item.item) + '</td></tr>'
        + '<tr><td class="label">Kategori</td><td class="val"><span class="badge ' + badgeClass + '">' + escapeHtml(item.category) + '</span></td></tr>'
        + '<tr><td class="label">Department/PIC</td><td class="val">' + escapeHtml(item.department) + '</td></tr>'
        + '<tr><td class="label">Lokasi</td><td class="val">' + escapeHtml(item.location) + '</td></tr>'
        + '<tr><td class="label">Status</td><td class="val">' + escapeHtml(item.status) + '</td></tr>'
        + '<tr><td class="label">Kondisi</td><td class="val">' + escapeHtml(item.condition) + '</td></tr>';
      if (item.qty) {
        rows += '<tr><td class="label">Qty</td><td class="val">' + escapeHtml(item.qty) + '</td></tr>';
      }
      if (item.purchaseDate) {
        rows += '<tr><td class="label">Tgl Perolehan</td><td class="val">' + escapeHtml(item.purchaseDate) + '</td></tr>';
      }
      if (item.purchaseValue) {
        rows += '<tr><td class="label">Harga Perolehan</td><td class="val">Rp ' + Number(item.purchaseValue).toLocaleString('id-ID') + '</td></tr>';
      }
      return ''
        + '<div class="kartu view">'
        + '  <div class="kartu-title">📋 Kartu Asset</div>'
        + '  <table>' + rows + '</table>'
        + '</div>';
    }

    function onScanSuccess(decodedText) {
      if (busy) return;
      busy = true;
      resultEl.innerHTML = currentMode === 'view'
        ? 'Mencari data asset: ' + decodedText + ' ...'
        : 'Memproses kode: ' + decodedText + ' ...';

      fetch(WEBAPP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari preflight CORS
        body: JSON.stringify({ data: decodedText, secret: SECRET_KEY, mode: currentMode })
      })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.status !== 'success') {
            resultEl.innerHTML = '<span class="err">❌ ' + (res.message || 'Gagal') + '</span>';
            addHistory('❌ ' + (res.message || 'Gagal'), 'err');
          } else if (res.found) {
            if (currentMode === 'view') {
              resultEl.innerHTML = renderKartuAsset(res.item);
              addHistory('📋 ' + res.timestamp + ' — dilihat: ' + res.item.number + ' (' + res.item.item + ')', 'ok');
            } else {
              resultEl.innerHTML =
                '<span class="ok">✅ ' + res.item.number + ' - ' + res.item.item + '</span><br>' +
                res.item.department + ' • ' + res.item.location;
              addHistory('✅ ' + res.timestamp + ' — ' + res.item.number + ' (' + res.item.item + ')', 'ok');
            }
          } else {
            if (currentMode === 'view') {
              resultEl.innerHTML =
                '<span class="warn">⚠️ Kode "' + decodedText + '" tidak ditemukan di data.</span>';
              addHistory('⚠️ ' + res.timestamp + ' — kode "' + decodedText + '" tidak dikenal (mode lihat)', 'warn');
            } else {
              resultEl.innerHTML =
                '<span class="warn">⚠️ Kode "' + decodedText + '" tidak ditemukan di data.</span><br>Tetap dicatat di log scan.';
              addHistory('⚠️ ' + res.timestamp + ' — kode "' + decodedText + '" tidak dikenal', 'warn');
            }
          }
          setTimeout(function () {
            busy = false;
            if (!resultEl.querySelector('.kartu')) {
              resultEl.innerText = currentMode === 'view'
                ? 'Arahkan kamera ke QR asset berikutnya...'
                : 'Arahkan kamera ke barcode/QR kode asset berikutnya...';
            }
          }, currentMode === 'view' ? 3200 : 2200);
        })
        .catch(function (err) {
          resultEl.innerHTML = '<span class="err">❌ Gagal menghubungi server: ' + err + '</span>';
          addHistory('❌ Gagal menghubungi server', 'err');
          busy = false;
        });
    }

    if (WEBAPP_URL.indexOf('GANTI_DENGAN') !== -1 || SECRET_KEY.indexOf('GANTI_DENGAN') !== -1) {
      resultEl.innerHTML = '<span class="err">Halaman belum dikonfigurasi. Isi WEBAPP_URL & SECRET_KEY di source code dulu.</span>';
    } else if (typeof Html5Qrcode === 'undefined') {
      resultEl.innerHTML = '<span class="err">Gagal memuat library scanner. Periksa koneksi internet lalu muat ulang halaman.</span>';
    } else {
      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(function (err) {
        resultEl.innerHTML = '<span class="err">Gagal mengakses kamera: ' + err + '<br>Pastikan browser diberi izin kamera dan halaman diakses lewat HTTPS.</span>';
      });
    }
  </script>
</body>
</html>
